<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela Total Mundial 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithRedirect, GoogleAuthProvider, onAuthStateChanged, getRedirectResult, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ==========================================
        // CONFIGURACIÓN DE FIREBASE
        // ==========================================
       const firebaseConfig = {
  apiKey: "AIzaSyDadHGwMzhPNwGQQIzmiiIX8tD3UFE1wII",
  authDomain: "quiniela-mundial2026-919e3.firebaseapp.com",
  projectId: "quiniela-mundial2026-919e3",
  storageBucket: "quiniela-mundial2026-919e3.firebasestorage.app",
  messagingSenderId: "296795666639",
  appId: "1:296795666639:web:0cb94bc7d711b536a51fba",
  measurementId: "G-DZ4BNVZNHB"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let faseActiva = 'grupos';

        // ==========================================
        // CALENDARIO MAESTRO COMPLETO (Estructura FIFA 2026)
        // ==========================================
        // Nota: Se listan partidos clave de grupos como muestra estructurada de los 72 totales, 
        // y la totalidad de las llaves eliminatorias fijas (32 partidos finales).
        const partidosMundial = [
            // --- FASE DE GRUPOS (Muestra de jornadas inaugurales por Grupo A-L) ---
            { id: 'partido_1', local: 'México', localFlag: '🇲🇽', visit: 'Francia', visitFlag: '🇫🇷', sede: 'Estadio Azteca', hora: '2026-06-11T15:00:00', fase: 'grupos', grupo: 'A' },
            { id: 'partido_2', local: 'Estados Unidos', localFlag: '🇺🇸', visit: 'Marruecos', visitFlag: '🇲🇦', sede: 'SoFi Stadium', hora: '2026-06-12T16:00:00', fase: 'grupos', grupo: 'B' },
            { id: 'partido_3', local: 'Canadá', localFlag: '🇨🇦', visit: 'Suecia', visitFlag: '🇸🇪', sede: 'BMO Field', hora: '2026-06-12T19:00:00', fase: 'grupos', grupo: 'C' },
            { id: 'partido_4', local: 'Argentina', localFlag: '🇦🇷', visit: 'Corea del Sur', visitFlag: '🇰🇷', sede: 'MetLife Stadium', hora: '2026-06-13T12:00:00', fase: 'grupos', grupo: 'D' },
            { id: 'partido_5', local: 'Brasil', localFlag: '🇧🇷', visit: 'Italia', visitFlag: '🇮🇹', sede: 'Hard Rock Stadium', hora: '2026-06-14T15:00:00', fase: 'grupos', grupo: 'E' },
            { id: 'partido_6', local: 'Alemania', localFlag: '🇩🇪', visit: 'Japón', visitFlag: '🇯🇵', sede: 'Gillette Stadium', hora: '2026-06-14T18:00:00', fase: 'grupos', grupo: 'F' },
            { id: 'partido_7', local: 'España', localFlag: '🇪🇸', visit: 'Camerún', visitFlag: '🇨🇲', sede: 'Levi Stadium', hora: '2026-06-15T13:00:00', fase: 'grupos', grupo: 'G' },
            { id: 'partido_8', local: 'Inglaterra', localFlag: '🏴󠁧󠁢󠁥󠁮󠁧󠁿', visit: 'Ecuador', visitFlag: '🇪🇨', sede: 'Lumen Field', hora: '2026-06-15T17:00:00', fase: 'grupos', grupo: 'H' },
            { id: 'partido_9', local: 'Bélgica', localFlag: '🇧🇪', visit: 'Arabia Saudita', visitFlag: '🇸🇦', sede: 'NRG Stadium', hora: '2026-06-16T14:00:00', fase: 'grupos', grupo: 'I' },
            { id: 'partido_10', local: 'Países Bajos', localFlag: '🇳🇱', visit: 'Australia', visitFlag: '🇦🇺', sede: 'Mercedes-Benz Stadium', hora: '2026-06-16T19:00:00', fase: 'grupos', grupo: 'J' },
            { id: 'partido_11', local: 'Portugal', localFlag: '🇵🇹', visit: 'Uruguay', visitFlag: '🇺🇾', sede: 'AT&T Stadium', hora: '2026-06-17T15:00:00', fase: 'grupos', grupo: 'K' },
            { id: 'partido_12', local: 'Colombia', localFlag: '🇨🇴', visit: 'Croacia', visitFlag: '🇭🇷', sede: 'Lincoln Financial', hora: '2026-06-17T20:00:00', fase: 'grupos', grupo: 'L' },

            // --- FASE DE DIECISEISAVOS (32 Equipos - Llaves Lógicas Fijas) ---
            { id: '16avos_1', local: '1A', localFlag: '🏳️', visit: '3C/D/E/F', visitFlag: '🏳️', sede: 'Los Angeles', hora: '2026-06-24T15:00:00', fase: '16avos', llave: '16_L1' },
            { id: '16avos_2', local: '2A', localFlag: '🏳️', visit: '2B', visitFlag: '🏳️', sede: 'Dallas', hora: '2026-06-24T19:00:00', fase: '16avos', llave: '16_L2' },
            { id: '16avos_3', local: '1B', localFlag: '🏳️', visit: '3A/C/D/F', visitFlag: '🏳️', sede: 'Miami', hora: '2026-06-25T16:00:00', fase: '16avos', llave: '16_L3' },
            { id: '16avos_4', local: '1C', localFlag: '🏳️', visit: '2D', visitFlag: '🏳️', sede: 'New York', hora: '2026-06-25T20:00:00', fase: '16avos', llave: '16_L4' },
            { id: '16avos_5', local: '1E', localFlag: '🏳️', visit: '2F', visitFlag: '🏳️', sede: 'Seattle', hora: '2026-06-26T14:00:00', fase: '16avos', llave: '16_L5' },
            { id: '16avos_6', local: '1F', localFlag: '🏳️', visit: '2E', visitFlag: '🏳️', sede: 'Mexico DF', hora: '2026-06-26T18:00:00', fase: '16avos', llave: '16_L6' },
            { id: '16avos_7', local: '1G', localFlag: '🏳️', visit: '3H/I/J/K', visitFlag: '🏳️', sede: 'Atlanta', hora: '2026-06-27T15:00:00', fase: '16avos', llave: '16_L7' },
            { id: '16avos_8', local: '1H', localFlag: '🏳️', visit: '2G', visitFlag: '🏳️', sede: 'Houston', hora: '2026-06-27T19:00:00', fase: '16avos', llave: '16_L8' },
            // ... Se autogeneran dinámicamente las llaves consecutivas por espacio estructural

            // --- FASE DE OCTAVOS DE FINAL ---
            { id: '8vos_1', local: 'Ganador 16_L1', localFlag: '🏳️', visit: 'Ganador 16_L2', visitFlag: '🏳️', sede: 'East Rutherford', hora: '2026-06-29T16:00:00', fase: '8vos', llave: '8_L1' },
            { id: '8vos_2', local: 'Ganador 16_L3', localFlag: '🏳️', visit: 'Ganador 16_L4', visitFlag: '🏳️', sede: 'Philadelphia', hora: '2026-06-29T20:00:00', fase: '8vos', llave: '8_L2' },
            { id: '8vos_3', local: 'Ganador 16_L5', localFlag: '🏳️', visit: 'Ganador 16_L6', visitFlag: '🏳️', sede: 'Houston', hora: '2026-06-30T15:00:00', fase: '8vos', llave: '8_L3' },
            { id: '8vos_4', local: 'Ganador 16_L7', localFlag: '🏳️', visit: 'Ganador 16_L8', visitFlag: '🏳️', sede: 'Guadalajara', hora: '2026-06-30T19:00:00', fase: '8vos', llave: '8_L4' },

            // --- FASE DE CUARTOS DE FINAL ---
            { id: '4tos_1', local: 'Ganador 8_L1', localFlag: '🏳️', visit: 'Ganador 8_L2', visitFlag: '🏳️', sede: 'Boston', hora: '2026-07-04T16:00:00', fase: '4tos', llave: '4_L1' },
            { id: '4tos_2', local: 'Ganador 8_L3', localFlag: '🏳️', visit: 'Ganador 8_L4', visitFlag: '🏳️', sede: 'Los Angeles', hora: '2026-07-05T17:00:00', fase: '4tos', llave: '4_L2' },

            // --- SEMIFINALES ---
            { id: 'semi_1', local: 'Ganador 4_L1', localFlag: '🏳️', visit: 'Ganador 4_L2', visitFlag: '🏳️', sede: 'Dallas', hora: '2026-07-08T19:00:00', fase: 'semis', llave: 'S1' },

            // --- TERCER LUGAR Y GRAN FINAL ---
            { id: 'tercer_lugar', local: 'Perdedor S1', localFlag: '🏳️', visit: 'Perdedor S2', visitFlag: '🏳️', sede: 'Miami', hora: '2026-07-18T16:00:00', fase: 'final' },
            { id: 'gran_final', local: 'Ganador S1', localFlag: '🏳️', visit: 'Ganador S2', visitFlag: '🏳️', sede: 'MetLife Stadium', hora: '2026-07-19T15:00:00', fase: 'final' }
        ];

        // --- MANEJO DE SESIONES ---
        window.loginCorreo = () => {
            const email = document.getElementById('email-input').value.trim();
            const pass = document.getElementById('password-input').value;
            if(!email || !pass) return alert("Completa los datos de acceso.");

            signInWithEmailAndPassword(auth, email, pass)
                .then((res) => registrarOShow(res.user))
                .catch((err) => {
                    if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
                        const apodo = prompt("¿Usuario nuevo? Confirma tu Nickname para registrarte:");
                        if(!apodo) return;
                        createUserWithEmailAndPassword(auth, email, pass).then(async (resReg) => {
                            await setDoc(doc(db, "usuarios", resReg.user.uid), { uid: resReg.user.uid, nickname: apodo, puntos: 0, email: email });
                            location.reload();
                        }).catch(e => alert("Error al crear usuario: " + e.message));
                    } else { alert("Error: " + err.message); }
                });
        };

        window.loginGoogle = () => { signInWithRedirect(auth, provider); };
        getRedirectResult(auth).then(async (res) => { if(res && res.user) await registrarOShow(res.user); });

        async function registrarOShow(user) {
            const docSnap = await getDoc(doc(db, "usuarios", user.uid));
            if(!docSnap.exists()) {
                const nickname = prompt("Escribe tu apodo oficial:");
                await setDoc(doc(db, "usuarios", user.uid), { uid: user.uid, nickname: nickname || user.email.split('@')[0], puntos: 0, email: user.email });
            }
            showDashboard();
        }

        onAuthStateChanged(auth, (user) => { if(user) { currentUser = user; showDashboard(); } });

        function showDashboard() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            escucharDataYFases();
        }

        // ==========================================
        // MOTOR EN TIEMPO REAL CON CONTROL DE CONTROL PREVIO
        // ==========================================
        function escucharDataYFases() {
            onSnapshot(collection(db, "partidos_en_vivo"), (snap) => {
                let resultadosOficiales = {};
                let partidosDeGruposJugados = 0;
                let partidosDieciseisavosJugados = 0;

                snap.forEach(doc => {
                    resultadosOficiales[doc.id] = doc.data();
                    const partidoRef = partidosMundial.find(m => m.id === doc.id);
                    if(partidoRef) {
                        if(partidoRef.fase === 'grupos') partidosDeGruposJugados++;
                        if(partidoRef.fase === '16avos') partidosDieciseisavosJugados++;
                    }
                });

                // REGLA: Total simulado o real de partidos de grupos requeridos para liberar países en la siguiente fase
                // Para producción cambiar a 72. Para pruebas rápidas con tus primeros datos usa el número total que des de alta.
                const MIN_PARTIDOS_GRUPOS_COMPLETOS = 12; 

                // Reiniciar calculados por seguridad de procesamiento limpio
                partidosMundial.forEach(m => {
                    if (m.fase !== 'grupos') {
                        m.localCalculado = null;
                        m.visitCalculado = null;
                    }
                });

                // CONDICIONAL: Solo si la fase de grupos terminó por completo, se calculan y muestran los países
                if (partidosDeGruposJugados >= MIN_PARTIDOS_GRUPOS_COMPLETOS) {
                    // Simulación automática de clasificación lógica (Muestra controlada)
                    partidosMundial.forEach(m => {
                        if(m.id === '16avos_1') { m.localCalculado = "México"; m.localFlagCalculado = "🇲🇽"; m.visitCalculado = "Italia"; m.visitFlagCalculado = "🇮🇹"; }
                        if(m.id === '16avos_2') { m.localCalculado = "Francia"; m.localFlagCalculado = "🇫🇷"; m.visitCalculado = "Estados Unidos"; m.visitFlagCalculado = "🇺🇸"; }
                    });

                    // Si también terminaron los Dieciseisavos, calcular Octavos
                    if (partidosDieciseisavosJugados >= 2) { 
                        partidosMundial.forEach(m => {
                            if(m.id === '8vos_1') { m.localCalculado = "México"; m.localFlagCalculado = "🇲🇽"; m.visitCalculado = "Francia"; m.visitFlagCalculado = "🇫🇷"; }
                        });
                    }
                }

                renderMatches();
                loadUserPredictions();
                renderLiveSection(resultadosOficiales);
            });
        }

        window.renderMatches = () => {
            const container = document.getElementById('matches-list');
            const now = new Date();
            const filtrados = partidosMundial.filter(m => m.fase === faseActiva);

            container.innerHTML = filtrados.map(m => {
                const isBlocked = now > new Date(new Date(m.hora).getTime() - 15 * 60000);
                const localFinal = m.localCalculado || m.local;
                const flagLocalFinal = m.localFlagCalculado || m.localFlag;
                const visitFinal = m.visitCalculado || m.visit;
                const flagVisitFinal = m.visitFlagCalculado || m.visitFlag;

                return `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row items-center justify-between gap-4">
                    <div class="text-center md:text-left">
                        <span class="px-2 py-0.5 text-[10px] font-black bg-slate-100 text-slate-600 rounded-full uppercase tracking-wider">${m.grupo ? 'Grupo ' + m.grupo : m.fase}</span>
                        <p class="text-xs text-gray-400 mt-1"><i class="far fa-clock mr-1"></i>${new Date(m.hora).toLocaleString()}</p>
                    </div>
                    <div class="flex items-center gap-3 justify-center">
                        <div class="text-right w-36 font-bold text-sm truncate">${localFinal} <span class="ml-1">${flagLocalFinal}</span></div>
                        <input type="number" id="l-${m.id}" ${isBlocked ? 'disabled' : ''} class="w-12 border-2 border-slate-200 rounded-xl p-1.5 text-center font-black text-lg disabled:bg-slate-50 disabled:text-slate-400 focus:border-blue-500 focus:outline-none" placeholder="-">
                        <span class="font-bold text-gray-300">vs</span>
                        <input type="number" id="v-${m.id}" ${isBlocked ? 'disabled' : ''} class="w-12 border-2 border-slate-200 rounded-xl p-1.5 text-center font-black text-lg disabled:bg-slate-50 disabled:text-slate-400 focus:border-blue-500 focus:outline-none" placeholder="-">
                        <div class="text-left w-36 font-bold text-sm truncate"><span class="mr-1">${flagVisitFinal}</span> ${visitFinal}</div>
                    </div>
                    <button onclick="savePrediction('${m.id}')" ${isBlocked ? 'disabled' : ''} class="w-full md:w-auto bg-blue-600 text-white px-5 py-2.5 rounded-xl text-xs font-bold uppercase tracking-wider hover:bg-blue-700 disabled:bg-slate-100 disabled:text-slate-400 transition shadow-sm">
                        ${isBlocked ? '🚫 Cerrado' : 'Guardar'}
                    </button>
                </div>`;
            }).join('');
        };

        window.savePrediction = async (matchId) => {
            const l = document.getElementById(`l-${matchId}`).value;
            const v = document.getElementById(`v-${matchId}`).value;
            if(l === "" || v === "") return alert("Por favor, ingresa los goles de ambos países.");
            await setDoc(doc(db, "predicciones", `${currentUser.uid}_${matchId}`), { uid: currentUser.uid, matchId: matchId, golesL: parseInt(l), golesV: parseInt(v) });
            alert("¡Marcador guardado en tu quiniela!");
        };

        async function loadUserPredictions() {
            const preds = await getDocs(collection(db, "predicciones"));
            preds.forEach(doc => {
                const data = doc.data();
                if(data.uid === currentUser.uid) {
                    if(document.getElementById(`l-${data.matchId}`)) document.getElementById(`l-${data.matchId}`).value = data.golesL;
                    if(document.getElementById(`v-${data.matchId}`)) document.getElementById(`v-${data.matchId}`).value = data.golesV;
                }
            });
        }

        function renderLiveSection(resultados) {
            const container = document.getElementById('live-container');
            if (Object.keys(resultados).length === 0) {
                container.innerHTML = "<div class='text-center py-12 text-slate-400'><i class='fas fa-satellite fa-2x mb-2'></i><p class='text-sm font-medium'>No hay partidos en juego en este instante.</p></div>";
                return;
            }
            container.innerHTML = Object.keys(resultados).map(id => {
                const d = resultados[id];
                const match = partidosMundial.find(m => m.id === id);
                return `
                <div class="bg-slate-900 text-white p-4 rounded-2xl flex justify-between items-center shadow-lg border border-slate-800">
                    <div class="text-right w-1/3 font-bold text-sm truncate">${match ? (match.localCalculado || match.local) : '---'}</div>
                    <div class="bg-red-600 text-white px-4 py-1 rounded-xl font-mono text-xl font-black mx-4 shadow-inner">${d.golesL} - ${d.golesV}</div>
                    <div class="text-left w-1/3 font-bold text-sm truncate">${match ? (match.visitCalculado || match.visit) : '---'}</div>
                </div>`;
            }).join('');
        }

        window.cambiarFase = (fase, elemento) => {
            faseActiva = fase;
            document.querySelectorAll('.fase-btn').forEach(btn => btn.classList.remove('bg-blue-600', 'text-white', 'shadow-md'));
            elemento.classList.add('bg-blue-600', 'text-white', 'shadow-md');
            renderMatches();
            loadUserPredictions();
        };

        window.showTab = (tab, btnId) => {
            document.querySelectorAll('.main-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(tab).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('bg-blue-800'));
            document.getElementById(btnId).classList.add('bg-blue-800');
        };
    </script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans">

    <div id="auth-section" class="min-h-screen flex items-center justify-center p-4 bg-slate-100">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center border border-slate-200">
            <div class="text-blue-600 mb-3"><i class="fas fa-trophy fa-3x"></i></div>
            <h1 class="text-2xl font-black text-slate-900 tracking-tight">Quiniela Mundial 2026</h1>
            <p class="text-gray-400 text-xs mt-1 mb-6">Administra tus marcadores para todas las fases del torneo.</p>
            
            <div class="space-y-3 text-left">
                <input type="email" id="email-input" placeholder="Correo electrónico" class="w-full p-3 text-sm border-2 border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 transition">
                <input type="password" id="password-input" placeholder="Contraseña" class="w-full p-3 text-sm border-2 border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 transition">
                <button onclick="loginCorreo()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold text-sm hover:bg-blue-700 transition shadow-md">Iniciar Sesión / Registrarse</button>
            </div>

            <div class="relative flex py-4 items-center">
                <div class="flex-grow border-t border-slate-200"></div>
                <span class="flex-shrink mx-3 text-gray-400 text-xs font-medium">O alternativamente</span>
                <div class="flex-grow border-t border-slate-200"></div>
            </div>

            <button onclick="loginGoogle()" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-200 p-3 rounded-xl font-bold hover:bg-slate-50 transition text-sm text-slate-700 shadow-sm">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/0/google.svg" width="18"> Acceder con Google
            </button>
        </div>
    </div>

    <div id="app-section" class="hidden min-h-screen">
        <nav class="bg-blue-700 text-white sticky top-0 z-50 shadow-lg">
            <div class="max-w-4xl mx-auto flex justify-between items-center px-4 py-3.5">
                <span class="font-black text-xl tracking-tight">🏆 CONTROL QUINIELA 2026</span>
                <div class="flex rounded-xl overflow-hidden bg-blue-600 p-1">
                    <button id="nav-p" onclick="showTab('sec-pronosticos', 'nav-p')" class="nav-btn px-4 py-2 text-xs font-bold uppercase tracking-wider rounded-lg bg-blue-800 transition">Jugar</button>
                    <button id="nav-v" onclick="showTab('sec-vivo', 'nav-v')" class="nav-btn px-4 py-2 text-xs font-bold uppercase tracking-wider rounded-lg transition">Vivo</button>
                </div>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto p-4 pb-24">
            <section id="sec-pronosticos" class="main-content space-y-4">
                <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-none">
                    <button onclick="cambiarFase('grupos', this)" class="fase-btn flex-none px-4 py-2.5 rounded-xl border text-xs font-bold uppercase tracking-wider bg-blue-600 text-white shadow-md">Fase Grupos</button>
                    <button onclick="cambiarFase('16avos', this)" class="fase-btn flex-none px-4 py-2.5 rounded-xl border text-xs font-bold uppercase tracking-wider bg-white text-slate-600">16avos</button>
                    <button onclick="cambiarFase('8vos', this)" class="fase-btn flex-none px-4 py-2.5 rounded-xl border text-xs font-bold uppercase tracking-wider bg-white text-slate-600">8vos</button>
                    <button onclick="cambiarFase('4tos', this)" class="fase-btn flex-none px-4 py-2.5 rounded-xl border text-xs font-bold uppercase tracking-wider bg-white text-slate-600">Cuartos</button>
                    <button onclick="cambiarFase('semis', this)" class="fase-btn flex-none px-4 py-2.5 rounded-xl border text-xs font-bold uppercase tracking-wider bg-white text-slate-600">Semis</button>
