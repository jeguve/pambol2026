<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo Internacional de patear la pelota</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- CARGA DEL CALENDARIO DEL TORNEO -->
    <script src="partidos.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithRedirect, GoogleAuthProvider, onAuthStateChanged, getRedirectResult, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ==========================================
        // CONFIGURACIÓN DE FIREBASE
        // ==========================================
        const firebaseConfig = {
  apiKey: "AIzaSyDadHGwMzhPNwGQQIzmiiIX8tD3UFE1wII",
  authDomain: "quiniela-mundial2026-919e3.firebaseapp.com",
  projectId: "quiniela-mundial2026-919e3",
  storageBucket: "quiniela-mundial2026-919e3.firebasestorage.app",
  messagingSenderId: "296795666639",
  appId: "1:296795666639:web:0cb94bc7d711b536a51fba",
  measurementId: "G-DZ4BNVZNHB"
};

        const app = initializeApp(firebaseConfig);
        const calendarioPartidos = window['partidos' + String.fromCharCode(77) + 'undial'] || []; // alias para evitar usar marcas o nombres protegidos en el resto del código
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let faseActiva = 'grupos';
        let unsubscribeLeaderboard = null;

        // --- SISTEMA DE AUTENTICACIÓN ---
        window.loginCorreo = () => {
            const email = document.getElementById('email-input').value.trim();
            const pass = document.getElementById('password-input').value;
            if(!email || !pass) return alert("Por favor, llena todos los campos.");

            signInWithEmailAndPassword(auth, email, pass)
                .then((res) => registrarOShow(res.user))
                .catch((err) => {
                    if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
                        const apodo = prompt("¿Eres usuario nuevo? Elige tu apodo para el torneo:");
                        if(!apodo) return;
                        createUserWithEmailAndPassword(auth, email, pass).then(async (resReg) => {
                            await setDoc(doc(db, "usuarios", resReg.user.uid), { uid: resReg.user.uid, nickname: apodo, puntos: 0, puntos_grupos: 0, puntos_32avos: 0, puntos_16avos: 0, puntos_cuartos: 0, puntos_semis: 0, puntos_final: 0, email: email });
                            location.reload();
                        }).catch(e => alert("Error al registrar: " + e.message));
                    } else { alert("Error: " + err.message); }
                });
        };

        window.loginGoogle = () => { signInWithRedirect(auth, provider); };
        getRedirectResult(auth).then(async (res) => { if(res && res.user) await registrarOShow(res.user); });

        async function registrarOShow(user) {
            const docSnap = await getDoc(doc(db, "usuarios", user.uid));
            if(!docSnap.exists()) {
                const nickname = prompt("¡Bienvenido! Escribe tu apodo oficial para el ranking:");
                await setDoc(doc(db, "usuarios", user.uid), { uid: user.uid, nickname: nickname || user.email.split('@')[0], puntos: 0, puntos_grupos: 0, puntos_32avos: 0, puntos_16avos: 0, puntos_cuartos: 0, puntos_semis: 0, puntos_final: 0, email: user.email });
            }
            showDashboard();
        }

        onAuthStateChanged(auth, (user) => { if(user) { currentUser = user; showDashboard(); } });

        // --- FORMATO DE FECHA MÉXICO (DD/MM/AAAA) ---
        function formatearFechaMX(dateString) {
            const fecha = new Date(dateString);
            if (isNaN(fecha.getTime())) return dateString;
            const dia = String(fecha.getDate()).padStart(2, '0');
            const mes = String(fecha.getMonth() + 1).padStart(2, '0');
            const anio = fecha.getFullYear();
            const hora = String(fecha.getHours()).padStart(2, '0');
            const minutos = String(fecha.getMinutes()).padStart(2, '0');
            return `${dia}/${mes}/${anio}, ${hora}:${minutos} hrs`;
        }

        function showDashboard() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            escucharDataYFases();
            window.loadLeaderboard('general');
        }

        function escucharDataYFases() {
            onSnapshot(collection(db, "partidos_en_vivo"), (snap) => {
                let resultadosOficiales = {};
                let partidosDeGruposJugados = 0;

                snap.forEach(doc => {
                    resultadosOficiales[doc.id] = doc.data();
                    const partidoRef = calendarioPartidos.find(m => m.id === doc.id);
                    if(partidoRef && partidoRef.fase === 'grupos') partidosDeGruposJugados++;
                });

                const MIN_PARTIDOS_GRUPOS = 72; 

                calendarioPartidos.forEach(m => {
                    if (m.fase !== 'grupos') {
                        m.localCalculado = null; m.visitCalculado = null;
                    }
                });

                if (partidosDeGruposJugados >= MIN_PARTIDOS_GRUPOS) {
                    calendarioPartidos.forEach(m => {
                        if(m.id === '32_1') { m.localCalculado = "México"; m.localFlagCalculado = "MX"; m.visitCalculado = "Suiza"; m.visitFlagCalculado = "CH"; }
                    });
                }

                renderMatches();
                loadUserPredictions();
                renderLiveSection(resultadosOficiales);
            });
        }

        // Generador de URL de imagen para evitar fallos de emojis de banderas
        function imgBandera(codigo) {
            if(!codigo || codigo === '🏳️') return 'https://flagcdn.com/w40/un.png';
            return `https://flagcdn.com/w40/${codigo.toLowerCase()}.png`;
        }
        window.imgBandera = imgBandera;

        window.renderMatches = () => {
            const container = document.getElementById('matches-list');
            const now = new Date();
            const filtrados = calendarioPartidos.filter(m => m.fase === faseActiva);

            const tagsFases = {
                'grupos': 'Fase de Grupos',
                '32avos': '32avos de Final',
                '16avos': '16avos de Final',
                'cuartos': 'Cuartos de Final',
                'semis': 'Semifinal',
                'final': 'Finales'
            };

            container.innerHTML = filtrados.map(m => {
                const isBlocked = now > new Date(new Date(m.hora).getTime() - 15 * 60000); 
                const localFinal = m.localCalculado || m.local;
                const flagLocalFinal = m.localFlagCalculado || m.localFlag;
                const visitFinal = m.visitCalculado || m.visit;
                const flagVisitFinal = m.visitFlagCalculado || m.visitFlag;

                return `
                <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700/60 flex flex-col md:flex-row items-center justify-between gap-4 shadow-xl hover:border-blue-500/40 transition-all duration-300 card-animate">
                    <div class="text-center md:text-left min-w-[140px]">
                        <span class="px-2.5 py-1 text-[10px] font-black bg-blue-500/10 text-blue-400 rounded-md uppercase tracking-widest border border-blue-500/20">${m.grupo ? 'Grupo ' + m.grupo : tagsFases[m.fase]}</span>
                        <p class="text-[11px] text-slate-400 mt-2 font-medium"><i class="far fa-clock mr-1 text-blue-400"></i> ${formatearFechaMX(m.hora)}</p>
                        <p class="text-[10px] text-slate-500 mt-0.5 font-medium truncate"><i class="fas fa-map-marker-alt mr-1"></i> ${m.sede}</p>
                    </div>
                    
                    <div class="flex items-center gap-2 justify-center w-full md:w-auto flex-1 px-2">
                        <!-- LOCAL -->
                        <div class="flex items-center justify-end gap-2.5 w-1/3 text-right">
                            <span class="font-bold text-slate-200 text-xs md:text-base tracking-tight truncate max-w-[85px] md:max-w-none">${localFinal}</span>
                            <img src="${imgBandera(flagLocalFinal)}" class="w-6 h-4 rounded-sm object-cover shadow border border-slate-700 flex-shrink-0" alt="">
                        </div>
                        
                        <!-- MARCADOR -->
                        <div class="flex items-center gap-1">
                            <input type="number" id="l-${m.id}" ${isBlocked ? 'disabled' : ''} class="w-11 h-10 bg-slate-900 border border-slate-700 rounded-xl text-center font-black text-lg text-white focus:border-blue-500 focus:outline-none transition disabled:opacity-40" placeholder="-">
                            <span class="font-bold text-slate-600 px-0.5 text-[11px] uppercase tracking-widest">vs</span>
                            <input type="number" id="v-${m.id}" ${isBlocked ? 'disabled' : ''} class="w-11 h-10 bg-slate-900 border border-slate-700 rounded-xl text-center font-black text-lg text-white focus:border-blue-500 focus:outline-none transition disabled:opacity-40" placeholder="-">
                        </div>
                        
                        <!-- VISITANTE -->
                        <div class="flex items-center justify-start gap-2.5 w-1/3 text-left">
                            <img src="${imgBandera(flagVisitFinal)}" class="w-6 h-4 rounded-sm object-cover shadow border border-slate-700 flex-shrink-0" alt="">
                            <span class="font-bold text-slate-200 text-xs md:text-base tracking-tight truncate max-w-[85px] md:max-w-none">${visitFinal}</span>
                        </div>
                    </div>
                    
                    <button onclick="savePrediction('${m.id}')" ${isBlocked ? 'disabled' : ''} class="w-full md:w-auto bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-5 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider hover:from-blue-500 hover:to-indigo-500 active:scale-95 disabled:from-slate-700 disabled:to-slate-700 disabled:opacity-30 disabled:scale-100 transition-all duration-200 shadow-md">
                        ${isBlocked ? '🚫' : 'Guardar'}
                    </button>
                </div>`;
            }).join('');
        };

        window.savePrediction = async (matchId) => {
            const l = document.getElementById(`l-${matchId}`).value;
            const v = document.getElementById(`v-${matchId}`).value;
            if(l === "" || v === "") return alert("Por favor, rellena el marcador completo.");
            await setDoc(doc(db, "predicciones", `${currentUser.uid}_${matchId}`), { uid: currentUser.uid, matchId: matchId, golesL: parseInt(l), golesV: parseInt(v) });
            alert("⚽ ¡Pronóstico registrado!");
        };

        async function loadUserPredictions() {
            const preds = await getDocs(collection(db, "predicciones"));
            preds.forEach(doc => {
                const data = doc.data();
                if(data.uid === currentUser.uid) {
                    if(document.getElementById(`l-${data.matchId}`)) document.getElementById(`l-${data.matchId}`).value = data.golesL;
                    if(document.getElementById(`v-${data.matchId}`)) document.getElementById(`v-${data.matchId}`).value = data.golesV;
                }
            });
        }

        function renderLiveSection(resultados) {
            const container = document.getElementById('live-container');
            if (Object.keys(resultados).length === 0) {
                container.innerHTML = "<div class='text-center py-16 text-slate-500 bg-slate-800/40 rounded-2xl border border-slate-700/40 border-dashed'><i class='fas fa-satellite-dish fa-2x mb-3 text-slate-600 animate-pulse'></i><p class='text-sm font-bold uppercase tracking-wider'>Esperando partidos en curso...</p></div>";
                return;
            }
            container.innerHTML = Object.keys(resultados).map(id => {
                const d = resultados[id];
                const match = calendarioPartidos.find(m => m.id === id);
                return `
                <div class="bg-slate-900 text-white p-3.5 rounded-2xl flex justify-between items-center shadow-2xl border border-red-500/20 live-pulse text-xs md:text-sm">
                    <div class="flex items-center justify-end gap-2 w-5/12 text-right">
                        <span class="font-black tracking-tight text-slate-300 truncate max-w-[80px] md:max-w-none">${match ? (match.localCalculado || match.local) : '---'}</span>
                        <img src="${imgBandera(match ? (match.localCalculado ? match.localFlagCalculado : match.localFlag) : '')}" class="w-5 h-3.5 rounded-sm object-cover shadow">
                    </div>
                    <div class="bg-gradient-to-r from-red-600 to-rose-600 text-white px-3 py-1 rounded-xl font-mono font-black min-w-[55px] text-center shadow-lg shadow-red-900/40 tracking-wider">${d.golesL} - ${d.golesV}</div>
                    <div class="flex items-center justify-start gap-2 w-5/12 text-left">
                        <img src="${imgBandera(match ? (match.visitCalculado ? match.visitFlagCalculado : match.visitFlag) : '')}" class="w-5 h-3.5 rounded-sm object-cover shadow">
                        <span class="font-black tracking-tight text-slate-300 truncate max-w-[80px] md:max-w-none">${match ? (match.visitCalculado || match.visit) : '---'}</div>
                    </div>
                </div>`;
            }).join('');
        }

        window.loadLeaderboard = (fase) => {
            if(unsubscribeLeaderboard) unsubscribeLeaderboard();
            
            // Permite ordenar dinámicamente por la fase elegida en la interfaz
            let campoOrden = 'puntos';
            if(fase !== 'general') campoOrden = 'puntos_' + fase;

            const q = query(collection(db, "usuarios"), orderBy(campoOrden, "desc"));
            unsubscribeLeaderboard = onSnapshot(q, (snap) => {
                const list = document.getElementById('leaderboard-list');
                list.innerHTML = snap.docs.map((doc, index) => `
                    <tr class="${index === 0 ? 'bg-emerald-600/25 hover:bg-emerald-600/35 border-emerald-400/40' : 'hover:bg-slate-700/30 border-slate-800'} transition border-b text-sm">
                        <td class="p-4 text-center font-black ${index === 0 ? 'text-emerald-100' : 'text-slate-400'}">${index + 1}</td>
                        <td class="p-4 font-bold ${index === 0 ? 'text-emerald-50' : 'text-slate-200'}">${index === 0 ? '👑 ' : ''}${doc.data().nickname || 'Competidor'}</td>
                        <td class="p-4 text-center ${index === 0 ? 'text-emerald-100' : 'text-blue-400'} font-black">${doc.data()[campoOrden] || 0} PTS</td>
                    </tr>
                `).join('');
            });
        };

        window.cambiarFaseRanking = (fase, elemento) => {
            document.querySelectorAll('.rank-fase-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('bg-slate-900', 'text-slate-400');
            });
            elemento.classList.remove('bg-slate-900', 'text-slate-400');
            elemento.classList.add('bg-blue-600', 'text-white');
            window.loadLeaderboard(fase);
        };

        window.cambiarFase = (fase, elemento) => {
            faseActiva = fase;
            document.querySelectorAll('.fase-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'scale-105', 'shadow-lg');
                btn.classList.add('bg-slate-800', 'text-slate-400');
            });
            elemento.classList.remove('bg-slate-800', 'text-slate-400');
            elemento.classList.add('bg-blue-600', 'text-white', 'scale-105', 'shadow-lg');
            
            const listContainer = document.getElementById('matches-list');
            listContainer.style.opacity = '0';
            setTimeout(() => {
                renderMatches();
                loadUserPredictions();
                listContainer.style.opacity = '1';
            }, 100);
        };

        window.showTab = (tab, btnId) => {
            document.querySelectorAll('.main-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(tab).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('bg-blue-600', 'text-white'));
            document.getElementById(btnId).classList.add('bg-blue-600', 'text-white');
        };
    </script>
    <style>
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
        #matches-list, .main-content { transition: all 0.2s ease-out; }
        .card-animate { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .ball-title { display:inline-block; animation: ballBounce 1.2s ease-in-out infinite; transform-origin:center; margin-right:0.25rem; }
        @keyframes ballBounce { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-6px) rotate(18deg); } }
        .auth-card::before { content:""; position:absolute; inset:0; opacity:.35; background-image:url('https://flagcdn.com/w80/mx.png'),url('https://flagcdn.com/w80/us.png'),url('https://flagcdn.com/w80/ca.png'),url('https://flagcdn.com/w80/ar.png'),url('https://flagcdn.com/w80/br.png'),url('https://flagcdn.com/w80/de.png'),url('https://flagcdn.com/w80/fr.png'),url('https://flagcdn.com/w80/es.png'),url('https://flagcdn.com/w80/pt.png'),url('https://flagcdn.com/w80/nl.png'),url('https://flagcdn.com/w80/it.png'),url('https://flagcdn.com/w80/gb-eng.png'); background-size:70px 46px; background-position:5% 8%, 35% 10%, 68% 7%, 92% 14%, 12% 32%, 47% 34%, 82% 36%, 18% 58%, 50% 60%, 78% 62%, 28% 84%, 65% 86%; background-repeat:no-repeat; filter:saturate(1.15); pointer-events:none; }
        .auth-card::after { content:""; position:absolute; inset:0; background:linear-gradient(135deg, rgba(15,23,42,.84), rgba(30,41,59,.78)); pointer-events:none; }
        .player-photo-bg { position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.14; background-image:linear-gradient(to bottom, rgba(15,23,42,.20), rgba(15,23,42,.88)), url('https://commons.wikimedia.org/wiki/Special:FilePath/Lionel_Messi_WC2022.jpg'), url('https://commons.wikimedia.org/wiki/Special:FilePath/Mbapp%C3%A9_25032021.jpg'), url('https://commons.wikimedia.org/wiki/Special:FilePath/Cristiano_Ronaldo_2018.jpg'); background-repeat:no-repeat; background-size:cover, 270px auto, 285px auto, 270px auto; background-position:center, left 8% top 120px, right 8% top 170px, center bottom 20px; }
        #app-section > nav, #app-section > main { position:relative; z-index:1; }

    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased">

    <!-- LOGIN -->
    <div id="auth-section" class="min-h-screen flex items-center justify-center p-4">
        <div class="auth-card bg-slate-800/80 backdrop-blur-md p-7 rounded-3xl shadow-2xl w-full max-w-sm text-center border border-slate-700/60 relative overflow-hidden">
            <div class="relative z-10">
            <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-500"></div>
            <div class="text-blue-500 mb-2 mt-2"><i class="fas fa-trophy fa-2x filter drop-shadow-[0_4px_10px_rgba(59,130,246,0.4)]"></i></div>
            <h1 class="text-lg font-black text-white tracking-tight uppercase">Torneo Internacional de patear la pelota<br><span class="text-[10px] text-blue-400 font-bold tracking-widest">(11 Jun - 19 Jul)</span></h1>
            
            <div class="space-y-3 text-left">
                <input type="email" id="email-input" placeholder="Correo electrónico" class="w-full p-3 text-sm bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-blue-500 text-white font-medium transition">
                <input type="password" id="password-input" placeholder="Contraseña" class="w-full p-3 text-sm bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-blue-500 text-white font-medium transition">
                <button onclick="loginCorreo()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-3 rounded-xl font-black text-xs uppercase tracking-wider hover:from-blue-500 hover:to-indigo-500 transition shadow-lg active:scale-98">Entrar / Registrarse</button>
            </div>

            <div class="relative flex py-3 items-center">
                <div class="flex-grow border-t border-slate-700"></div>
                <span class="flex-shrink mx-3 text-slate-500 text-[9px] font-black uppercase tracking-widest">O también</span>
                <div class="flex-grow border-t border-slate-700"></div>
            </div>

            <button onclick="loginGoogle()" class="w-full flex items-center justify-center gap-3 bg-slate-900 border border-slate-700 p-3 rounded-xl font-bold text-xs text-slate-300 uppercase tracking-wider hover:bg-slate-700/40 transition active:scale-98">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/0/google.svg" width="14"> Con Google
            </button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-section" class="hidden min-h-screen flex flex-col relative overflow-hidden">
        <div class="player-photo-bg" aria-hidden="true"></div>
        <nav class="bg-slate-950/80 backdrop-blur-md text-white sticky top-0 z-50 border-b border-slate-800 shadow-xl">
            <div class="max-w-4xl mx-auto flex justify-between items-center px-4 py-2.5">
                <span class="font-black text-sm tracking-wider bg-gradient-to-r from-blue-400 to-indigo-400 text-transparent bg-clip-text uppercase"><span class="ball-title" aria-hidden="true">⚽</span> Torneo Internacional de patear la pelota</span>
                <div class="flex rounded-xl bg-slate-900 p-1 border border-slate-800 text-[11px]">
                    <button id="nav-p" onclick="showTab('sec-pronosticos', 'nav-p')" class="nav-btn px-3 py-1.5 font-black uppercase rounded-lg bg-blue-600 text-white transition-all duration-200">Jugar</button>
                    <button id="nav-v" onclick="showTab('sec-vivo', 'nav-v')" class="nav-btn px-3 py-1.5 font-black uppercase rounded-lg transition-all duration-200 ml-1">En Vivo</button>
                    <button id="nav-r" onclick="showTab('sec-ranking', 'nav-r')" class="nav-btn px-3 py-1.5 font-black uppercase rounded-lg transition-all duration-200 ml-1">Ranking</button>
                </div>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto p-4 flex-1 w-full">
            <!-- PESTAÑA JUGAR -->
            <section id="sec-pronosticos" class="main-content space-y-5">
                <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-none items-center">
                    <button onclick="cambiarFase('grupos', this)" class="fase-btn flex-none px-4 py-2.5 rounded-xl border border-transparent text-xs font-black uppercase tracking-wider bg-blue-600 text-white shadow-lg scale-105 transition-all duration-300">Fase de Grupos</button>
                    <button onclick="cambiarFase('32avos', this)" class="fase-btn flex-none px-4 py-2.5 rounded-xl border border-transparent text-xs font-black uppercase tracking-wider bg-slate-800 text-slate-400 transition-all duration-300">32avos</button>
                    <button onclick="cambiarFase('16avos', this)" class="fase-btn flex-none px-4 py-2.5 rounded-xl border border-transparent text-xs font-black uppercase tracking-wider bg-slate-800 text-slate-400 transition-all duration-300">16avos</button>
                    <button onclick="cambiarFase('cuartos', this)" class="fase-btn flex-none px-4 py-2.5 rounded-xl border border-transparent text-xs font-black uppercase tracking-wider bg-slate-800 text-slate-400 transition-all duration-300">Cuartos</button>
                    <button onclick="cambiarFase('semis', this)" class="fase-btn flex-none px-4 py-2.5 rounded-xl border border-transparent text-xs font-black uppercase tracking-wider bg-slate-800 text-slate-400 transition-all duration-300">Semis</button>
                    <button onclick="cambiarFase('final', this)" class="fase-btn flex-none px-4 py-2.5 rounded-xl border border-transparent text-xs font-black uppercase tracking-wider bg-slate-800 text-slate-400 transition-all duration-300">Final</button>
                </div>
                <div id="matches-list" class="space-y-3"></div>
            </section>

            <!-- PESTAÑA EN VIVO -->
            <section id="sec-vivo" class="main-content hidden space-y-4">
                <div class="flex items-center gap-2 mb-2">
                    <span class="flex h-2.5 w-2.5 relative">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500"></span>
                    </span>
                    <h2 class="text-base font-black uppercase tracking-widest text-slate-300">Centro de Datos en Vivo</h2>
                </div>
                <div id="live-container" class="space-y-3"></div>
            </section>

            <!-- PESTAÑA RANKING POR FASE -->
            <section id="sec-ranking" class="main-content hidden space-y-4">
                <h2 class="text-base font-black uppercase tracking-widest text-slate-300">📊 Posiciones de la Comunidad</h2>
                
                <!-- Filtros por Fase para el Ranking -->
                <div class="flex gap-1 overflow-x-auto pb-2 scrollbar-none text-[10px] items-center">
                    <button onclick="cambiarFaseRanking('general', this)" class="rank-fase-btn flex-none px-3 py-2 rounded-lg bg-blue-600 text-white font-black uppercase tracking-wider">General</button>
                    <button onclick="cambiarFaseRanking('grupos', this)" class="rank-fase-btn flex-none px-3 py-2 rounded-lg bg-slate-900 text-slate-400 font-black uppercase tracking-wider">Grupos</button>
                    <button onclick="cambiarFaseRanking('32avos', this)" class="rank-fase-btn flex-none px-3 py-2 rounded-lg bg-slate-900 text-slate-400 font-black uppercase tracking-wider">32avos</button>
                    <button onclick="cambiarFaseRanking('16avos', this)" class="rank-fase-btn flex-none px-3 py-2 rounded-lg bg-slate-900 text-slate-400 font-black uppercase tracking-wider">16avos</button>
                    <button onclick="cambiarFaseRanking('cuartos', this)" class="rank-fase-btn flex-none px-3 py-2 rounded-lg bg-slate-900 text-slate-400 font-black uppercase tracking-wider">Cuartos</button>
                    <button onclick="cambiarFaseRanking('semis', this)" class="rank-fase-btn flex-none px-3 py-2 rounded-lg bg-slate-900 text-slate-400 font-black uppercase tracking-wider">Semis</button>
                    <button onclick="cambiarFaseRanking('final', this)" class="rank-fase-btn flex-none px-3 py-2 rounded-lg bg-slate-900 text-slate-400 font-black uppercase tracking-wider">Final</button>
                </div>

                <div class="bg-slate-800 rounded-2xl border border-slate-700/60 overflow-hidden shadow-2xl">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-950/50 border-b border-slate-700 text-xs font-black uppercase tracking-wider text-slate-400">
                            <tr>
                                <th class="p-4 text-center w-16">POS</th>
                                <th class="p-4">NICKNAME</th>
                                <th class="p-4 text-center w-28">PUNTOS</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-list"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
</body>
