<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- CARGA DEL CALENDARIO OFICIAL MAESTRO -->
    <script src="partidos.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithRedirect, GoogleAuthProvider, onAuthStateChanged, getRedirectResult, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ==========================================
        // CONFIGURACIÓN DE FIREBASE
        // ==========================================
   const firebaseConfig = {
  apiKey: "AIzaSyDadHGwMzhPNwGQQIzmiiIX8tD3UFE1wII",
  authDomain: "quiniela-mundial2026-919e3.firebaseapp.com",
  projectId: "quiniela-mundial2026-919e3",
  storageBucket: "quiniela-mundial2026-919e3.firebasestorage.app",
  messagingSenderId: "296795666639",
  appId: "1:296795666639:web:0cb94bc7d711b536a51fba",
  measurementId: "G-DZ4BNVZNHB"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let faseActiva = 'grupos';

        // --- SISTEMA DE AUTENTICACIÓN ---
        window.loginCorreo = () => {
            const email = document.getElementById('email-input').value.trim();
            const pass = document.getElementById('password-input').value;
            if(!email || !pass) return alert("Por favor, llena todos los campos.");

            signInWithEmailAndPassword(auth, email, pass)
                .then((res) => registrarOShow(res.user))
                .catch((err) => {
                    if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
                        const apodo = prompt("¿Eres usuario nuevo? Elige tu apodo oficial para la Quiniela:");
                        if(!apodo) return;
                        createUserWithEmailAndPassword(auth, email, pass).then(async (resReg) => {
                            await setDoc(doc(db, "usuarios", resReg.user.uid), { uid: resReg.user.uid, nickname: apodo, puntos: 0, email: email });
                            location.reload();
                        }).catch(e => alert("Error al registrar: " + e.message));
                    } else { alert("Error: " + err.message); }
                });
        };

        window.loginGoogle = () => { signInWithRedirect(auth, provider); };
        getRedirectResult(auth).then(async (res) => { if(res && res.user) await registrarOShow(res.user); });

        async function registrarOShow(user) {
            const docSnap = await getDoc(doc(db, "usuarios", user.uid));
            if(!docSnap.exists()) {
                const nickname = prompt("¡Bienvenido! Escribe tu apodo oficial para el ranking:");
                await setDoc(doc(db, "usuarios", user.uid), { uid: user.uid, nickname: nickname || user.email.split('@')[0], puntos: 0, email: user.email });
            }
            showDashboard();
        }

        onAuthStateChanged(auth, (user) => { if(user) { currentUser = user; showDashboard(); } });

        function showDashboard() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            escucharDataYFases();
        }

        // --- PROCESAMIENTO DINÁMICO DE LLAVES ---
        function escucharDataYFases() {
            onSnapshot(collection(db, "partidos_en_vivo"), (snap) => {
                let resultadosOficiales = {};
                let partidosDeGruposJugados = 0;

                snap.forEach(doc => {
                    resultadosOficiales[doc.id] = doc.data();
                    const partidoRef = window.partidosMundial.find(m => m.id === doc.id);
                    if(partidoRef && partidoRef.fase === 'grupos') partidosDeGruposJugados++;
                });

                const MIN_PARTIDOS_GRUPOS = 72; 

                window.partidosMundial.forEach(m => {
                    if (m.fase !== 'grupos') {
                        m.localCalculado = null; m.visitCalculado = null;
                    }
                });

                if (partidosDeGruposJugados >= MIN_PARTIDOS_GRUPOS) {
                    window.partidosMundial.forEach(m => {
                        if(m.id === '16_1') { m.localCalculado = "México"; m.localFlagCalculado = "🇲🇽"; m.visitCalculado = "Suiza"; m.visitFlagCalculado = "🇨🇭"; }
                    });
                }

                renderMatches();
                loadUserPredictions();
                renderLiveSection(resultadosOficiales);
            });
        }

        window.renderMatches = () => {
            const container = document.getElementById('matches-list');
            const now = new Date();
            const filtrados = window.partidosMundial.filter(m => m.fase === faseActiva);

            container.innerHTML = filtrados.map(m => {
                const isBlocked = now > new Date(new Date(m.hora).getTime() - 15 * 60000); 
                const localFinal = m.localCalculado || m.local;
                const flagLocalFinal = m.localFlagCalculado || m.localFlag;
                const visitFinal = m.visitCalculado || m.visit;
                const flagVisitFinal = m.visitFlagCalculado || m.visitFlag;

                const etiquetaFaseVisual = m.fase === '16avos' ? '32AVOS DE FINAL' : m.fase;

                return `
                <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700/60 flex flex-col md:flex-row items-center justify-between gap-4 shadow-xl hover:border-blue-500/40 transition-all duration-300 card-animate">
                    <div class="text-center md:text-left">
                        <span class="px-2.5 py-1 text-[10px] font-black bg-blue-500/10 text-blue-400 rounded-md uppercase tracking-widest border border-blue-500/20">${m.grupo ? 'Grupo ' + m.grupo : etiquetaFaseVisual}</span>
                        <p class="text-xs text-slate-400 mt-2 font-medium"><i class="far fa-calendar-alt mr-1.5 text-blue-400"></i>${new Date(m.hora).toLocaleString()}</p>
                        <p class="text-[11px] text-slate-500 mt-0.5 font-medium"><i class="fas fa-map-marker-alt mr-1.5"></i>${m.sede}</p>
                    </div>
                    
                    <div class="flex items-center gap-4 justify-center my-2 md:my-0 w-full md:w-auto">
                        <div class="text-right w-36 font-bold text-slate-200 text-sm md:text-base truncate">${localFinal} <span class="ml-1.5">${flagLocalFinal}</span></div>
                        <div class="flex items-center gap-1.5">
                            <input type="number" id="l-${m.id}" ${isBlocked ? 'disabled' : ''} class="w-12 h-11 bg-slate-900 border-2 border-slate-700 rounded-xl text-center font-black text-xl text-white focus:border-blue-500 focus:outline-none transition disabled:opacity-40" placeholder="-">
                            <span class="font-bold text-slate-600 px-1 text-xs uppercase tracking-widest">vs</span>
                            <input type="number" id="v-${m.id}" ${isBlocked ? 'disabled' : ''} class="w-12 h-11 bg-slate-900 border-2 border-slate-700 rounded-xl text-center font-black text-xl text-white focus:border-blue-500 focus:outline-none transition disabled:opacity-40" placeholder="-">
                        </div>
                        <div class="text-left w-36 font-bold text-slate-200 text-sm md:text-base truncate"><span class="mr-1.5">${flagVisitFinal}</span> ${visitFinal}</div>
                    </div>
                    
                    <button onclick="savePrediction('${m.id}')" ${isBlocked ? 'disabled' : ''} class="w-full md:w-auto bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-6 py-3 rounded-xl text-xs font-black uppercase tracking-wider hover:from-blue-500 hover:to-indigo-500 active:scale-95 disabled:from-slate-700 disabled:to-slate-700 disabled:opacity-30 disabled:scale-100 transition-all duration-200 shadow-md shadow-blue-900/20">
                        ${isBlocked ? '🚫 Cerrado' : '<i class="fas fa-save mr-1.5"></i>Guardar'}
                    </button>
                </div>`;
            }).join('');
        };

        window.savePrediction = async (matchId) => {
            const l = document.getElementById(`l-${matchId}`).value;
            const v = document.getElementById(`v-${matchId}`).value;
            if(l === "" || v === "") return alert("Por favor, rellena el marcador completo.");
            await setDoc(doc(db, "predicciones", `${currentUser.uid}_${matchId}`), { uid: currentUser.uid, matchId: matchId, golesL: parseInt(l), golesV: parseInt(v) });
            alert("⚽ ¡Pronóstico registrado!");
        };

        async function loadUserPredictions() {
            const preds = await getDocs(collection(db, "predicciones"));
            preds.forEach(doc => {
                const data = doc.data();
                if(data.uid === currentUser.uid) {
                    if(document.getElementById(`l-${data.matchId}`)) document.getElementById(`l-${data.matchId}`).value = data.golesL;
                    if(document.getElementById(`v-${data.matchId}`)) document.getElementById(`v-${data.matchId}`).value = data.golesV;
                }
            });
        }

        function renderLiveSection(resultados) {
            const container = document.getElementById('live-container');
            if (Object.keys(resultados).length === 0) {
                container.innerHTML = "<div class='text-center py-16 text-slate-500 bg-slate-800/40 rounded-2xl border border-slate-700/40 border-dashed'><i class='fas fa-satellite-dish fa-2x mb-3 text-slate-600 animate-pulse'></i><p class='text-sm font-bold uppercase tracking-wider'>Esperando partidos en curso...</p></div>";
                return;
            }
            container.innerHTML = Object.keys(resultados).map(id => {
                const d = resultados[id];
                const match = window.partidosMundial.find(m => m.id === id);
                return `
                <div class="bg-slate-900 text-white p-4 rounded-2xl flex justify-between items-center shadow-2xl border border-red-500/20 live-pulse">
                    <div class="text-right w-1/3 font-black text-sm md:text-base tracking-tight text-slate-300">${match ? (match.localCalculado || match.local) : '---'}</div>
                    <div class="bg-gradient-to-r from-red-600 to-rose-600 text-white px-5 py-1.5 rounded-xl font-mono text-xl font-black mx-4 shadow-lg shadow-red-900/40 tracking-wider">${d.golesL} - ${d.golesV}</div>
                    <div class="text-left w-1/3 font-black text-sm md:text-base tracking-tight text-slate-300">${match ? (match.visitCalculado || match.visit) : '---'}</div>
                </div>`;
            }).join('');
        }

        window.cambiarFase = (fase, elemento) => {
            faseActiva = fase;
            document.querySelectorAll('.fase-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'scale-105', 'shadow-lg', 'shadow-blue-500/20');
                btn.classList.add('bg-slate-800', 'text-slate-400');
            });
            elemento.classList.remove('bg-slate-800', 'text-slate-400');
            elemento.classList.add('bg-blue-600', 'text-white', 'scale-105', 'shadow-lg', 'shadow-blue-500/20');
            
            const listContainer = document.getElementById('matches-list');
            listContainer.style.opacity = '0';
            listContainer.style.transform = 'translateY(10px)';
            setTimeout(() => {
                renderMatches();
                loadUserPredictions();
                listContainer.style.opacity = '1';
                listContainer.style.transform = 'translateY(0)';
            }, 150);
        };

        window.showTab = (tab, btnId) => {
            document.querySelectorAll('.main-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(tab).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('bg-blue-600', 'text-white'));
            document.getElementById(btnId).classList.add('bg-blue-600', 'text-white');
        };
    </script>
    <style>
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
        #matches-list, .main-content { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-animate { animation: slideIn 0.4s ease forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .live-pulse { animation: borderPulse 2s infinite; }
        @keyframes borderPulse { 0%, 100% { border-color: rgba(239, 68, 68, 0.2); } 50% { border-color: rgba(239, 68, 68, 0.6); } }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased">

    <!-- PANEL DE LOGEO -->
    <div id="auth-section" class="min-h-screen flex items-center justify-center p-4 bg-radial from-slate-800 to-slate-950">
        <div class="bg-slate-800/80 backdrop-blur-md p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center border border-slate-700/60 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-500"></div>
            <div class="text-blue-500 mb-3 mt-2"><i class="fas fa-trophy fa-3x filter drop-shadow-[0_4px_10px_rgba(59,130,246,0.4)]"></i></div>
            <h1 class="text-xl font-black text-white tracking-tight uppercase">Quiniela 2026 (11 Jun - 19 Jul)</h1>
            <p class="text-slate-400 text-xs mt-1 mb-6 font-medium">Sigue las llaves, suma puntos y domina el tablero.</p>
            
            <div class="space-y-3 text-left">
                <input type="email" id="email-input" placeholder="Correo electrónico" class="w-full p-3.5 text-sm bg-slate-900 border-2 border-slate-700 rounded-xl focus:outline-none focus:border-blue-500 text-white font-medium transition">
                <input type="password" id="password-input" placeholder="Contraseña" class="w-full p-3.5 text-sm bg-slate-900 border-2 border-slate-700 rounded-xl focus:outline-none focus:border-blue-500 text-white font-medium transition">
                <button onclick="loginCorreo()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-3.5 rounded-xl font-black text-xs uppercase tracking-wider hover:from-blue-500 hover:to-indigo-500 transition shadow-lg shadow-blue-900/40 active:scale-98">Entrar / Registrarse</button>
            </div>

            <div class="relative flex py-4 items-center">
                <div class="flex-grow border-t border-slate-700"></div>
                <span class="flex-shrink mx-3 text-slate-500 text-[10px] font-black uppercase tracking-widest">O también</span>
                <div class="flex-grow border-t border-slate-700"></div>
            </div>

            <button onclick="loginGoogle()" class="w-full flex items-center justify-center gap-3 bg-slate-900 border border-slate-700 p-3.5 rounded-xl font-bold text-xs text-slate-300 uppercase tracking-wider hover:bg-slate-700/40 transition active:scale-98">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/0/google.svg" width="16"> Cuenta de Google
            </button>
        </div>
    </div>

    <!-- PANEL DE LA APLICACIÓN PRINCIPAL -->
    <div id="app-section" class="hidden min-h-screen flex flex-col">
        <nav class="bg-slate-950/80 backdrop-blur-md text-white sticky top-0 z-50 border-b border-slate-800 shadow-xl">
            <div class="max-w-4xl mx-auto flex justify-between items-center px-4 py-3">
                <span class="font-black text-base tracking-wider bg-gradient-to-r from-blue-400 to-indigo-400 text-transparent bg-clip-text uppercase"><i class="fas fa-shield-alt mr-2"></i>Quiniela 2026</span>
                <div class="flex rounded-xl bg-slate-900 p-1 border border-slate-800">
                    <button id="nav-p" onclick="showTab('sec-pronosticos', 'nav-p')" class="nav-btn px-4 py-2 text-xs font-black uppercase tracking-wider rounded-lg bg-blue-600 text-white transition-all duration-200">Jugar</button>
                    <button id="nav-v" onclick="showTab('sec-vivo', 'nav-v')" class="nav-btn px-4 py-2 text-xs font-black uppercase tracking-wider rounded-lg transition-all duration-200 ml-1">En Vivo</button>
                </div>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto p-4 flex-1 w-full">
            <!-- PESTAÑA JUGAR -->
            <section id="sec-pronosticos" class="main-content space-y-5">
                <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-none items-center">
                    <button onclick="cambiarFase('grupos', this)" class="fase-btn flex-none px-4 py-2.5 rounded-xl border border-transparent text-xs font-black uppercase tracking-wider bg-blue-600 text-white shadow-lg shadow-blue-500/20 scale-105 transition-all duration-300">Fase Grupos</button>
                    <button onclick="cambiarFase('16avos', this)" class="fase-btn flex-none px-4 py-2.5 rounded-xl border border-transparent text-xs font-black uppercase tracking-wider bg-slate-800 text-slate-400 transition-all duration-300">32avos</button>
                    <button onclick="cambiarFase('8vos', this)" class="fase-btn flex-none px-4 py-2.5 rounded-xl border border-transparent text-xs font-black uppercase tracking-wider bg-slate-800 text-slate-400 transition-all duration-300">8vos</button>
                    <button onclick="cambiarFase('4tos', this)" class="fase-btn flex-none px-4 py-2.5 rounded-xl border border-transparent text-xs font-black uppercase tracking-wider bg-slate-800 text-slate-400 transition-all duration-300">Cuartos</button>
                    <button onclick="cambiarFase('semis', this)" class="fase-btn flex-none px-4 py-2.5 rounded-xl border border-transparent text-xs font-black uppercase tracking-wider bg-slate-800 text-slate-400 transition-all duration-300">Semis</button>
                    <button onclick="cambiarFase('final', this)" class="fase-btn flex-none px-4 py-2.5 rounded-xl border border-transparent text-xs font-black uppercase tracking-wider bg-slate-800 text-slate-400 transition-all duration-300">Final</button>
                </div>
                <div id="matches-list" class="space-y-3"></div>
            </section>

            <!-- PESTAÑA EN VIVO -->
            <section id="sec-vivo" class="main-content hidden space-y-4">
                <div class="flex items-center gap-2 mb-2">
                    <span class="flex h-2.5 w-2.5 relative">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500"></span>
                    </span>
                    <h2 class="text-base font-black uppercase tracking-widest text-slate-300">Centro de Datos en Vivo</h2>
                </div>
                <div id="live-container" class="space-y-3"></div>
            </section>
        </main>
    </div>
</body>
</html>
