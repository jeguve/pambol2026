name: Actualizar marcadores API-Football

on:
  workflow_dispatch:
  schedule:
    # GitHub usa UTC. Corre cada 5 minutos, pero el script solo llama API-Football
    # cuando hay partidos cerca/en vivo y respeta el límite diario configurado.
    - cron: "*/5 * * * *"

concurrency:
  group: api-football-live
  cancel-in-progress: true

jobs:
  update-live-scores:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Update Firestore live scores
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          APIFOOTBALL_LEAGUE_ID: ${{ vars.APIFOOTBALL_LEAGUE_ID }}
          APIFOOTBALL_SEASON: ${{ vars.APIFOOTBALL_SEASON }}
          DAILY_API_LIMIT: "95"
          PRECHECK_MINUTES_BEFORE: "20"
          MAX_MINUTES_AFTER_START: "150"
        run: npm run live:update
